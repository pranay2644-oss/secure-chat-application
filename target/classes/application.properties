# ===============================
# SERVER
# ===============================
server.port=8080
server.address=0.0.0.0

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/secure_chat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# FIX Bug 5: slow startup — HikariPool sizing config
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=SecureChatPool

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# LOGGING
# FIX Bug 4: correct class name is org.springframework.web.SimpLogging
# NOT org.springframework.messaging.simp.broker — that is a different logger
# ===============================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.SimpLogging=WARN
logging.level.org.springframework.messaging.simp=WARN
logging.level.com.secure_chat=INFO

# ===============================
# MULTIPART
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ===============================
# JWT SECRET (must be 32+ chars for HS256)
# ===============================
jwt.secret=be6df5c69f72c6aacfbbd1b4722dafa4aaf397c2003899a0025bd1c54c3e749d
