<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat | Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-brand">✨</div>
  <div class="auth-title">Create account</div>
  <div class="auth-sub">Join Secure Chat — end-to-end encrypted</div>

  <div class="field-group">
    <input
      type="text"
      id="username"
      class="auth-input"
      placeholder="Username"
      autocomplete="username"
      onkeydown="if(event.key==='Enter') document.getElementById('email').focus()"
    >
    <input
      type="email"
      id="email"
      class="auth-input"
      placeholder="Email address"
      autocomplete="email"
      onkeydown="if(event.key==='Enter') document.getElementById('password').focus()"
    >
    <input
      type="password"
      id="password"
      class="auth-input"
      placeholder="Password (min 6 characters)"
      autocomplete="new-password"
      onkeydown="if(event.key==='Enter') doRegister()"
    >
  </div>

  <button class="auth-btn" id="regBtn" onclick="doRegister()">Create Account</button>

  <div class="auth-foot">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.showToast = function(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "info");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = "toast", 3200);
};

function doRegister() {
  const username = document.getElementById("username").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !email || !password) {
    showToast("All fields are required", "error"); return;
  }
  if (password.length < 6) {
    showToast("Password must be at least 6 characters", "error"); return;
  }

  const btn = document.getElementById("regBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating...';

  fetch("/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, email, password })
  })
  .then(res => {
    if (!res.ok) return res.text().then(t => { throw new Error(t || "Registration failed") });
    return res.json();
  })
  .then(() => {
    showToast("Account created! Redirecting...", "success");
    setTimeout(() => window.location.href = "login.html", 1400);
  })
  .catch(err => {
    showToast(err.message || "Registration failed", "error");
    btn.disabled = false;
    btn.innerHTML = "Create Account";
  });
}
</script>
</body>
</html>
