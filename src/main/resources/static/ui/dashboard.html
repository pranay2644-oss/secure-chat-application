<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-header">

      <!-- My profile row -->
      <div class="my-profile">
        <div class="my-avatar-wrap" onclick="window.location.href='profile.html'" title="Edit profile" style="cursor:pointer">
          <div class="my-avatar-circle avatar-gradient-me" id="myAvatarCircle">P</div>
          <span class="online-dot"></span>
        </div>
        <div class="my-info" onclick="window.location.href='profile.html'" style="cursor:pointer" title="Edit profile">
          <div class="my-name" id="loggedUser">Loading...</div>
          <div class="my-status">● Online</div>
        </div>
        <button class="logout-btn" onclick="logoutUser(event)">Logout</button>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 3a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 8.5a6.5 6.5 0 1111.436 4.23l3.857 3.857a.75.75 0 01-1.061 1.06l-3.857-3.856A6.5 6.5 0 012 8.5z" fill="currentColor"/>
        </svg>
        <input class="search-input" type="text" id="searchInput"
          placeholder="Search contacts..." oninput="filterUsers(this.value)" autocomplete="off"/>
      </div>
    </div>

    <div class="section-label">Conversations</div>
    <ul class="user-list" id="users"></ul>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">

    <!-- Welcome state -->
    <div class="welcome-state" id="welcomeState">
      <div class="welcome-icon-wrap"><span class="welcome-lock">🔒</span></div>
      <div class="welcome-title">Secure Chat</div>
      <div class="welcome-sub">Select a contact to start an end-to-end encrypted conversation.</div>
      <span class="welcome-chip">🛡 RSA + AES-256 encryption</span>
    </div>

    <!-- Chat panel -->
    <div id="chatPanel" class="chat-panel">

      <!-- Header -->
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
          <div class="chat-header-info">
            <div class="chat-username" id="chatUsername">—</div>
            <!-- presence OR typing indicator -->
            <div class="chat-presence-wrap">
              <div class="chat-presence" id="chatPresence"></div>
              <div class="typing-indicator" id="typingIndicator" style="display:none">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-text">typing</span>
              </div>
            </div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="clear-btn" onclick="deleteConversation()">🗑 Clear</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="messages"></div>

      <!-- Emoji Picker (hidden by default) -->
      <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-picker-header">
          <div class="emoji-cats" id="emojiCats"></div>
          <input class="emoji-search" type="text" placeholder="Search emoji..." id="emojiSearch" oninput="filterEmojis(this.value)">
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-bar">
        <input type="file" id="fileInput" hidden>
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="emoji-btn" id="emojiBtn" onclick="toggleEmojiPicker()" title="Emoji">😊</button>
        <input type="text" id="messageInput" class="message-input"
          placeholder="Type a secure message..."
          onkeydown="handleEnter(event)"
          oninput="handleTyping()"
          autocomplete="off"/>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send →</button>
      </div>

    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Reaction context menu -->
<div class="reaction-menu" id="reactionMenu">
  <div class="reaction-menu-inner" id="reactionMenuInner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="app.js"></script>
<script src="features.js"></script>
<script src="file-upload.js"></script>

<script>
window.showToast = function(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "info");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = "toast"; }, 3200);
};

window.showChatPanel = function() {
  document.getElementById("welcomeState").style.display = "none";
  document.getElementById("chatPanel").classList.add("visible");
};

window._updateChatHeader = function(username) {
  const el = document.getElementById("chatHeaderAvatar");
  if (el) el.textContent = (username || "?").charAt(0).toUpperCase();
};

window._updateMyAvatar = function(nameOrEmail) {
  const el = document.getElementById("myAvatarCircle");
  if (!el) return;
  const pic = localStorage.getItem("profilePicture");
  if (pic && pic.startsWith("data:image")) {
    el.style.backgroundImage    = "url(" + pic + ")";
    el.style.backgroundSize     = "cover";
    el.style.backgroundPosition = "center";
    el.style.color              = "transparent";
  } else {
    el.textContent = (nameOrEmail || "?").charAt(0).toUpperCase();
    el.style.backgroundImage = "";
    el.style.color = "";
  }
};

function logoutUser(e) {
  e.stopPropagation();
  if (window.stompClient) { try { window.stompClient.disconnect(); } catch(_) {} }
  localStorage.clear();
  window.location.href = "login.html";
}

// Close emoji picker when clicking outside
document.addEventListener("click", (e) => {
  const picker = document.getElementById("emojiPicker");
  const btn    = document.getElementById("emojiBtn");
  if (picker && !picker.contains(e.target) && e.target !== btn) {
    picker.classList.remove("open");
  }
  // Close reaction menu
  const rm = document.getElementById("reactionMenu");
  if (rm && !rm.contains(e.target) && !e.target.closest(".msg-react-btn")) {
    rm.classList.remove("open");
  }
});
</script>

</body>
</html>
