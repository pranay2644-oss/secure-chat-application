<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat | Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Profile-specific overrides ── */
body.profile-body {
  min-height: 100vh;
  height: auto;
  overflow: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 16px 48px;
  background: linear-gradient(135deg, #0d1526 0%, #1e2d4a 100%);
}

/* ── Profile Card ── */
.profile-card {
  background: #fff;
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.15);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 48px);
}

/* ── Card Header Banner ── */
.profile-banner {
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  height: 90px;
  position: relative;
}

/* ── Avatar Section ── */
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: -52px;
  padding: 0 32px 0;
  position: relative;
  z-index: 2;
}

.avatar-ring {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  transition: box-shadow 180ms cubic-bezier(0.4,0,0.2,1);
  user-select: none;
}
.avatar-ring:hover { box-shadow: 0 6px 22px rgba(99,102,241,0.5); }

/* Real profile picture inside avatar */
.avatar-ring img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: none;
}
.avatar-ring img.loaded { display: block; }

/* Camera overlay on hover */
.avatar-ring .cam-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 180ms cubic-bezier(0.4,0,0.2,1);
  font-size: 22px;
}
.avatar-ring:hover .cam-overlay { opacity: 1; }

.avatar-label {
  margin-top: 10px;
  font-size: 12px;
  color: #6366f1;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.avatar-label:hover { text-decoration: underline; }

/* ── Card Body ── */
.profile-body-inner {
  padding: 16px 32px 0;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.1) transparent;
}

/* ── Section heading inside card ── */
.profile-heading {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  text-align: center;
  margin-bottom: 4px;
  margin-top: 8px;
}

.profile-email-display {
  text-align: center;
  font-size: 13px;
  color: #64748b;
  margin-bottom: 24px;
}

/* ── Divider ── */
.profile-divider {
  height: 1px;
  background: #e2e8f0;
  margin: 0 -32px 24px;
}

/* ── Section label ── */
.section-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #94a3b8;
  margin-bottom: 14px;
}

/* ── Form Fields ── */
.profile-fields {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}

.profile-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.profile-field label {
  font-size: 12.5px;
  font-weight: 600;
  color: #374151;
  letter-spacing: 0.01em;
}

.profile-field input,
.profile-field textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #fff;
  outline: none;
  transition: border-color 180ms cubic-bezier(0.4,0,0.2,1),
              box-shadow 180ms cubic-bezier(0.4,0,0.2,1),
              background 180ms cubic-bezier(0.4,0,0.2,1);
  resize: none;
}
.profile-field input:focus,
.profile-field textarea:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}
.profile-field input:disabled {
  background: #f8fafc;
  color: #94a3b8;
  cursor: not-allowed;
  border-color: #e2e8f0;
}

/* Input with icon wrapper */
.input-wrap {
  position: relative;
}
.input-wrap .field-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
  color: #94a3b8;
}
.input-wrap input {
  padding-left: 38px;
}

/* Character counter */
.char-count {
  font-size: 11px;
  color: #94a3b8;
  text-align: right;
  margin-top: 2px;
}
.char-count.warn { color: #f59e0b; }
.char-count.over { color: #ef4444; }

/* ── Password Section ── */
.password-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.password-toggle-btn {
  font-size: 12.5px;
  font-weight: 600;
  color: #6366f1;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  padding: 0;
  transition: color 180ms;
}
.password-toggle-btn:hover { color: #4f51d8; text-decoration: underline; }

.password-fields {
  display: none;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
  padding: 16px;
  background: #f8fafc;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
}
.password-fields.open { display: flex; }

.password-strength {
  height: 4px;
  border-radius: 9999px;
  background: #e2e8f0;
  overflow: hidden;
  margin-top: 6px;
}
.password-strength-bar {
  height: 100%;
  border-radius: 9999px;
  width: 0%;
  transition: width 300ms ease, background 300ms ease;
}

.strength-label {
  font-size: 11.5px;
  margin-top: 5px;
  font-weight: 500;
}

/* Password visibility toggle */
.pw-wrap {
  position: relative;
}
.pw-wrap input { padding-right: 42px; }
.pw-toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #94a3b8;
  font-size: 16px;
  padding: 0;
  transition: color 180ms;
}
.pw-toggle-eye:hover { color: #6366f1; }

/* ── Stats Row ── */
.profile-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.stat-card {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px 10px;
  text-align: center;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: #6366f1;
  line-height: 1.2;
}

.stat-label {
  font-size: 10.5px;
  color: #94a3b8;
  font-weight: 500;
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ── Danger Zone ── */
.danger-zone {
  border: 1.5px solid #fecaca;
  border-radius: 12px;
  padding: 16px;
  background: #fff5f5;
  margin-bottom: 24px;
}

.danger-zone-title {
  font-size: 12px;
  font-weight: 700;
  color: #ef4444;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.danger-zone-text {
  font-size: 12.5px;
  color: #64748b;
  margin-bottom: 12px;
  line-height: 1.5;
}

.danger-btn {
  padding: 8px 16px;
  border: 1.5px solid #ef4444;
  border-radius: 9999px;
  background: #fff;
  color: #ef4444;
  font-size: 12.5px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.4,0,0.2,1);
}
.danger-btn:hover {
  background: #ef4444;
  color: #fff;
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(239,68,68,0.25);
}
.danger-btn:active { transform: scale(0.97); }

/* ── Actions — sticky footer ── */
.profile-actions {
  display: flex;
  gap: 10px;
  position: sticky;
  bottom: 0;
  background: #fff;
  padding: 16px 32px 24px;
  margin: 0 -32px;
  border-top: 1px solid #e2e8f0;
  z-index: 10;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
}

.profile-back {
  flex: 1;
  padding: 13px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  background: #fff;
  color: #374151;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.4,0,0.2,1);
}
.profile-back:hover {
  background: #f8fafc;
  border-color: #94a3b8;
  transform: translateY(-1px);
}
.profile-back:active { transform: scale(0.97); }

.profile-save {
  flex: 2;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 3px 12px rgba(99,102,241,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.profile-save:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  filter: brightness(1.07);
}
.profile-save:active { transform: scale(0.97); }
.profile-save:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 540px) {
  body.profile-body { padding: 0 0 48px; }

  .profile-card {
    border-radius: 0 0 20px 20px;
    max-width: 100%;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }

  .profile-banner { height: 70px; }

  .avatar-section { padding: 0 20px 0; margin-top: -46px; }

  .profile-body-inner { padding: 12px 20px 28px; }

  .profile-divider { margin: 0 -20px 20px; }

  .profile-stats { grid-template-columns: repeat(3, 1fr); }

  .profile-actions { flex-direction: column; padding: 14px 20px 20px; margin: 0 -20px; }
  .profile-back, .profile-save { flex: unset; width: 100%; }
}

@media (max-width: 360px) {
  .profile-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-value { font-size: 17px; }
  .stat-label { font-size: 9.5px; }
}
</style>
</head>
<body class="auth-body profile-body">

<div class="profile-card">

  <!-- Banner gradient -->
  <div class="profile-banner"></div>

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar-ring" id="avatarRing" onclick="document.getElementById('profileImageUpload').click()" title="Change photo">
      <span id="avatarInitial">?</span>
      <img id="profilePic" alt="">
      <div class="cam-overlay">📷</div>
    </div>
    <input type="file" id="profileImageUpload" hidden accept="image/*">
    <div class="avatar-label" onclick="document.getElementById('profileImageUpload').click()">Change photo</div>
  </div>

  <!-- Card Body -->
  <div class="profile-body-inner">

    <div class="profile-heading" id="displayName">My Profile</div>
    <div class="profile-email-display" id="emailDisplay">—</div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="stat-card">
        <div class="stat-value" id="statMessages">—</div>
        <div class="stat-label">Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statContacts">—</div>
        <div class="stat-label">Contacts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDays">—</div>
        <div class="stat-label">Days</div>
      </div>
    </div>

    <div class="profile-divider"></div>

    <!-- Profile Info Section -->
    <div class="section-title">Profile Info</div>
    <div class="profile-fields">

      <!-- Email (readonly) -->
      <div class="profile-field">
        <label>Email address</label>
        <div class="input-wrap">
          <span class="field-icon">✉️</span>
          <input id="email" type="email" disabled placeholder="your@email.com">
        </div>
      </div>

      <!-- Username -->
      <div class="profile-field">
        <label>Display name</label>
        <div class="input-wrap">
          <span class="field-icon">👤</span>
          <input id="username" type="text" placeholder="Your display name" maxlength="32"
                 oninput="updateCharCount('username','usernameCount',32); syncDisplayName()">
        </div>
        <div class="char-count" id="usernameCount">0 / 32</div>
      </div>

      <!-- Status -->
      <div class="profile-field">
        <label>Status message</label>
        <div class="input-wrap">
          <span class="field-icon">💬</span>
          <input id="status" type="text" placeholder="What's on your mind?" maxlength="80"
                 oninput="updateCharCount('status','statusCount',80)">
        </div>
        <div class="char-count" id="statusCount">0 / 80</div>
      </div>

    </div>

    <div class="profile-divider"></div>

    <!-- Change Password Section -->
    <div class="password-toggle-row">
      <div class="section-title" style="margin-bottom:0">Security</div>
      <button class="password-toggle-btn" id="pwToggleBtn" onclick="togglePasswordSection()">
        Change password ↓
      </button>
    </div>

    <div class="password-fields" id="passwordFields">

      <div class="profile-field">
        <label>Current password</label>
        <div class="pw-wrap">
          <input id="currentPassword" type="password" placeholder="Enter current password">
          <button class="pw-toggle-eye" onclick="toggleEye('currentPassword',this)" type="button">👁</button>
        </div>
      </div>

      <div class="profile-field">
        <label>New password</label>
        <div class="pw-wrap">
          <input id="newPassword" type="password" placeholder="Min 6 characters"
                 oninput="checkStrength(this.value)" maxlength="64">
          <button class="pw-toggle-eye" onclick="toggleEye('newPassword',this)" type="button">👁</button>
        </div>
        <div class="password-strength">
          <div class="password-strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel" style="color:#94a3b8"></div>
      </div>

      <div class="profile-field">
        <label>Confirm new password</label>
        <div class="pw-wrap">
          <input id="confirmPassword" type="password" placeholder="Repeat new password">
          <button class="pw-toggle-eye" onclick="toggleEye('confirmPassword',this)" type="button">👁</button>
        </div>
      </div>

    </div>

    <div class="profile-divider"></div>

    <!-- Danger Zone -->
    <div class="danger-zone">
      <div class="danger-zone-title">⚠ Danger zone</div>
      <div class="danger-zone-text">
        Deleting your account is permanent. All messages, keys, and data will be removed and cannot be recovered.
      </div>
      <button class="danger-btn" onclick="confirmDeleteAccount()">Delete my account</button>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <button class="profile-back" onclick="goBack()">← Back</button>
      <button class="profile-save" id="saveBtn" onclick="doSave()">Save Changes</button>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="profile.js"></script>
<script>

/* ── Toast ── */
window.showToast = function(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "info");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = "toast", 3200);
};

/* ── Back navigation ── */
function goBack() {
  window.location.href = "dashboard.html";
}

/* ── Sync display name in header ── */
function syncDisplayName() {
  const val = document.getElementById("username").value.trim();
  const el  = document.getElementById("displayName");
  if (el) el.textContent = val || "My Profile";
}

/* ── Character counter ── */
function updateCharCount(inputId, countId, max) {
  const len = document.getElementById(inputId).value.length;
  const el  = document.getElementById(countId);
  el.textContent = len + " / " + max;
  el.className = "char-count" + (len > max * 0.9 ? (len >= max ? " over" : " warn") : "");
}

/* ── Password section toggle ── */
function togglePasswordSection() {
  const fields = document.getElementById("passwordFields");
  const btn    = document.getElementById("pwToggleBtn");
  const open   = fields.classList.toggle("open");
  btn.textContent = open ? "Cancel ✕" : "Change password ↓";
  if (!open) {
    ["currentPassword","newPassword","confirmPassword"].forEach(id => {
      document.getElementById(id).value = "";
    });
    document.getElementById("strengthBar").style.width = "0%";
    document.getElementById("strengthLabel").textContent = "";
  }
}

/* ── Password strength ── */
function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 6)  score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const bar   = document.getElementById("strengthBar");
  const label = document.getElementById("strengthLabel");
  const map   = [
    { w: "0%",   c: "#e2e8f0", t: "" },
    { w: "25%",  c: "#ef4444", t: "Weak" },
    { w: "50%",  c: "#f59e0b", t: "Fair" },
    { w: "75%",  c: "#3b82f6", t: "Good" },
    { w: "90%",  c: "#22c55e", t: "Strong" },
    { w: "100%", c: "#22c55e", t: "Very strong" },
  ];
  const s = map[Math.min(score, 5)];
  bar.style.width = s.w;
  bar.style.background = s.c;
  label.textContent = s.t;
  label.style.color = s.c;
}

/* ── Eye toggle ── */
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const show = inp.type === "password";
  inp.type = show ? "text" : "password";
  btn.textContent = show ? "🙈" : "👁";
}

/* ── Save ── */
function doSave() {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';

  const pwOpen = document.getElementById("passwordFields").classList.contains("open");

  if (pwOpen) {
    const curr    = document.getElementById("currentPassword").value;
    const newPw   = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (newPw && newPw !== confirm) {
      showToast("Passwords do not match", "error");
      btn.disabled = false;
      btn.innerHTML = "Save Changes";
      return;
    }
    if (newPw && newPw.length < 6) {
      showToast("Password must be at least 6 characters", "error");
      btn.disabled = false;
      btn.innerHTML = "Save Changes";
      return;
    }
  }

  updateProfile()
    .then(() => {
      showToast("Profile saved!", "success");
    })
    .catch(() => {
      showToast("Failed to save profile", "error");
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = "Save Changes";
    });
}

/* ── Confirm account delete ── */
function confirmDeleteAccount() {
  const confirmed = confirm(
    "Are you absolutely sure?\n\n" +
    "This will permanently delete your account, all messages, and encryption keys.\n\n" +
    "This action CANNOT be undone."
  );
  if (!confirmed) return;
  showToast("Account deletion is not yet enabled by the admin.", "info");
}

/* ── Load profile stats (placeholder — wire to real API if available) ── */
function loadStats() {
  const email = localStorage.getItem("email");
  if (!email) return;
  const token = localStorage.getItem("token");

  // Contacts count
  fetch("/api/users", { headers: { "Authorization": "Bearer " + token } })
    .then(r => r.ok ? r.json() : [])
    .then(users => {
      const count = users.filter(u => u.email !== email).length;
      const el = document.getElementById("statContacts");
      if (el) el.textContent = count;
    })
    .catch(() => {});

  // Days since joined (rough: if user has a createdAt field)
  // Fallback placeholder
  document.getElementById("statMessages").textContent = "—";
  document.getElementById("statDays").textContent = "—";
}

loadStats();

</script>
</body>
</html>
