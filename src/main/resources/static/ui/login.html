<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat | Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-brand">🔒</div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Sign in to your encrypted account</div>

  <div class="field-group">
    <input
      type="email"
      id="email"
      class="auth-input"
      placeholder="Email address"
      autocomplete="email"
      onkeydown="if(event.key==='Enter') document.getElementById('password').focus()"
    >
    <input
      type="password"
      id="password"
      class="auth-input"
      placeholder="Password"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()"
    >
  </div>

  <button class="auth-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="auth-foot">
    No account? <a href="register.html">Create one</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
window.showToast = function(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "info");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = "toast", 3200);
};

function doLogin() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showToast("Please enter email and password", "error");
    return;
  }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  fetch("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(res => {
    if (!res.ok) return res.text().then(t => { throw new Error(t || "Invalid credentials") });
    return res.json();
  })
  .then(data => {
    localStorage.setItem("token", data.token);
    localStorage.setItem("email", email);
    window.location.href = "dashboard.html";
  })
  .catch(err => {
    showToast(err.message || "Login failed", "error");
    btn.disabled = false;
    btn.innerHTML = "Sign In";
  });
}
</script>
</body>
</html>
