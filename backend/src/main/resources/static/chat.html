<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat Test</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>
<h2>Real-Time Chat Test</h2>

<input id="sender" placeholder="Sender ID" />
<input id="receiver" placeholder="Receiver ID" />
<input id="message" placeholder="Message" />
<button onclick="sendMessage()">Send</button>

<ul id="chat"></ul>

<script>
    let socket = new SockJS('/chat');
    let stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {
        console.log("Connected");

        stompClient.subscribe('/topic/messages', function (msg) {
            let message = JSON.parse(msg.body);
            let li = document.createElement("li");
            li.innerText = message.senderId + ": " + message.content;
            document.getElementById("chat").appendChild(li);
        });
    });

    function sendMessage() {
        let senderId = document.getElementById("sender").value;
        let receiverId = document.getElementById("receiver").value;
        let content = document.getElementById("message").value;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            senderId: senderId,
            receiverId: receiverId,
            content: content
        }));
    }
</script>
</body>
</html>
